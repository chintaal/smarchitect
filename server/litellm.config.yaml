# LiteLLM gateway config — one OpenAI-compatible endpoint in front of 100+ models.
# Start the proxy:  litellm --config litellm.config.yaml
#
# Each SmArchitect agent picks a model by *alias* (architect, requirements, …),
# so models are swappable here without touching agent code.

model_list:
  # Frontier reasoning — Architect & Security Critic
  - model_name: architect
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: security
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY

  # Balanced — Requirements Analyst & Compliance Agent
  - model_name: requirements
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: compliance
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # Fast & cheap — node labels, cost math
  - model_name: cheap
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # Research — and a cross-provider fallback target
  - model_name: research
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

router_settings:
  routing_strategy: latency-based-routing
  num_retries: 2
  # When a primary is throttled/down, fall back to a secondary automatically.
  fallbacks:
    - architect: ["requirements", "research"]
    - research: ["requirements"]

litellm_settings:
  drop_params: true
  # Spend per project/user/virtual key, logged to Postgres; traces to Langfuse.
  success_callback: ["langfuse"]
  max_budget: 250        # USD/month default budget guard
  budget_duration: 30d

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
